<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Задание 3</title>

<style>
    .row {
        display: flex;
        margin-bottom: 10px;
        gap: 10px;
    }

    .box {
        padding: 20px;
        text-align: center;
        color: white;
    }

    .red { background: #e57373; flex: 1; }
    .blue { background: #64b5f6; flex: 2; }
    .green { background: #4db6ac; flex: 1; }
    .gray { background: #9e9e9e; flex: 1; }
</style>
</head>

<body>

<h2>Различные блоки</h2>

<div class="row">
    <div class="box red">Первый</div>
    <div class="box blue">Второй</div>
</div>

<div class="row">
    <div class="box red">Первый</div>
    <div class="box blue">Второй</div>
    <div class="box green">Третий</div>
    <div class="box gray">Четвёртый</div>
</div>

</body>
</html>
