<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Задание 4</title>

<style>
    .container {
        height: 300px;
        border: 2px solid #ccc;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px;
    }

    .box {
        padding: 15px;
        color: white;
        width: fit-content;
    }

    .top { background: #e57373; }
    .center {
        background: #ffd54f;
        align-self: center;
    }
    .bottom {
        background: #4db6ac;
        align-self: flex-end;
    }
</style>
</head>

<body>

<div class="container">
    <div class="box top">Верхний блок</div>
    <div class="box center">Центральный блок</div>
    <div class="box bottom">Нижний блок</div>
</div>

</body>
</html>
